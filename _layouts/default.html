<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}</title>
  <style>
    /* Global Styles */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: #333;
      max-width: 800px;
      margin: 0 auto;
      padding: 50px 20px;
    }
    
    /* Header Styles */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eaeaea;
      padding-bottom: 30px;
      margin-bottom: 50px;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .profile-pic {
      width: 200px;
      height: 200px;
      border-radius: 8px; /* Slight rounding, like your screenshot */
      object-fit: cover;
    }
    .site-info h1 {
      margin: 0;
      font-size: 26px;
      font-weight: 500;
    }
    .site-info p {
      margin: 5px 0 0 0;
      color: #666;
      font-size: 15px;
    }
    
    /* Navigation Styles */
    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #444;
      font-size: 16px;
    }
    nav a:hover {
      color: #000;
    }

    /* Link Styles */
    a.read-more {
      color: #6c9ce0; /* The specific light blue from your screenshot */
      text-decoration: none;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    a.read-more:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <img src="{{ site.avatar }}" alt="Profile Picture" class="profile-pic">
      <div class="site-info">
        <h1><a href="/IMMS-AI/" style="color: #333; text-decoration: none;">{{ site.title }}</a></h1>
        <p>{{ site.description }}</p>
      </div>
    </div>
    <nav>
      <a href="{{ site.baseurl }}/about.html">About</a>
      <a href="{{ site.baseurl }}/">Thoughts</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

</body>
</html>
